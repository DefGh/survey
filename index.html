<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Опрос</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: white;
      }

      main {
        width: 100vw;
        height: 100vh;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: white;
      }
    </style>
  </head>
  <body>
    <main>
      <iframe id="survey-frame" title="Опрос" loading="eager"></iframe>
    </main>

    <script>
      const surveys = [
        "https://docs.google.com/forms/d/1o8yOCVfQq-d_AMwv1UiSjf4Ta2MQoCtODyQxclcPX3k/viewform",
        "https://docs.google.com/forms/d/1HNVCnvVCVoZNl0XldjPRehePZX1fUJZO2ZejfjNe0hs/viewform",
      ];

      function randomIndex(max) {
        if (window.crypto?.getRandomValues) {
          const values = new Uint32Array(1);
          window.crypto.getRandomValues(values);
          return values[0] % max;
        }

        return Math.floor(Math.random() * max);
      }

      const index = randomIndex(surveys.length);
      console.log(index, surveys[index])
      const targetUrl = surveys[index];
      document.getElementById("survey-frame").src = targetUrl;
    </script>
  </body>
</html>
