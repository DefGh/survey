<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Опрос</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: white;
      }

      main {
        width: 100vw;
        height: 100vh;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: white;
      }
    </style>
  </head>
  <body>
    <main>
      <iframe id="survey-frame" title="Опрос" loading="eager"></iframe>
    </main>

    <script>
      const surveys = [
        "https://docs.google.com/forms/d/1o8yOCVfQq-d_AMwv1UiSjf4Ta2MQoCtODyQxclcPX3k/viewform?embedded=true",
        "https://docs.google.com/forms/d/1HNVCnvVCVoZNl0XldjPRehePZX1fUJZO2ZejfjNe0hs/viewform?embedded=true",
      ];
      const storageKey = 'storageKey';
      let targetUrl = localStorage.getItem(storageKey);

      if (!targetUrl) {
        const index = Math.floor(Math.random() * surveys.length);
        targetUrl = surveys[index];
        localStorage.setItem(storageKey, targetUrl);
      }
      
      document.getElementById("survey-frame").src = targetUrl;
    </script>
  </body>
</html>
